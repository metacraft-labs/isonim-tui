name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just lint
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  test:
    name: Test (orc/release/threads:on) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  test-real-terminal:
    name: Test (real terminal — M29) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test-real-terminal
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-terminal-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  cross-emulator:
    name: Test (cross-emulator — M29 follow-up) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test-cross-emulator
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-emulator-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  charter-matrix:
    name: Charter (${{ matrix.mm }}/${{ matrix.mode }}/threads:${{ matrix.threads }}) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
        mm: [arc, orc, refc]
        mode: [debug, release, danger]
        threads: [on, off]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just _matrix ${{ matrix.mm }} ${{ matrix.mode }} ${{ matrix.threads }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charter-${{ matrix.mm }}-${{ matrix.mode }}-${{ matrix.threads }}-${{ matrix.runner }}-logs
          path: test-logs/
          retention-days: 30

  sanitizers:
    name: Sanitizer (${{ matrix.kind }})
    # Linux-only (clang sanitizers); mapped to the Linux AMD64 Nix class.
    runs-on: incus
    strategy:
      fail-fast: false
      matrix:
        kind: [asan, ubsan, tsan, lsan]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test-${{ matrix.kind }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-${{ matrix.kind }}-logs
          path: test-logs/
          retention-days: 30

  valgrind:
    name: Valgrind
    # Linux-only (valgrind); mapped to the Linux AMD64 Nix class.
    runs-on: incus
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test-valgrind
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-logs
          path: test-logs/
          retention-days: 30

  test-macos:
    name: Test (macOS)
    runs-on: macos-tart
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-logs
          path: test-logs/
          retention-days: 30

  # Cross-compile gate run from a Linux host: `nim check --os:windows`
  # parses and type-checks the M10 WindowsDriver code path. Catches
  # Windows-side regressions early without waiting on the (slower)
  # Windows runner. Mirrors nim-termctl's check-windows-cross lane.
  check-windows-cross:
    name: Check (Windows cross from Linux) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just check-windows-cross
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-windows-cross-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  test-windows:
    name: Test (Windows) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [win-ephemeral, win-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.4'
      - name: Install just
        run: choco install just -y
      - name: Run Windows test lane
        run: just test-windows
        shell: cmd
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  nix-build:
    name: nix build (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build .#default
